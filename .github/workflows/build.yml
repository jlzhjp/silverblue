name: Build bootc image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-bootc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and publish
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    runs-on: ubuntu-latest
    container:
      image: quay.io/fedora/fedora-bootc:latest@sha256:b5be5aea0509926f27aca9b1c12f539970d4e90d6c968ae548a1b4c2e26b76cf
      options: --privileged
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Normalize image name
        id: image
        run: |
          image_name="${IMAGE_NAME,,}"
          version_tag="$(sed -n 's|^FROM quay\.io/fedora/fedora-silverblue:\([0-9][0-9]*\)@sha256:[a-f0-9]\{64\}$|\1|p' Containerfile | head -n 1)"
          if [[ -z "${version_tag}" ]]; then
            echo "Unable to determine Fedora Silverblue version from Containerfile" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA::12}"
          {
            echo "name=${image_name}"
            echo "version_tag=${version_tag}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: ${{ steps.image.outputs.name }}
          tags: |
            sha-${{ steps.image.outputs.short_sha }}
          archs: amd64
          layers: true
          oci: true
          containerfiles: |
            ./Containerfile

      - name: Build chunked OCI image
        env:
          CHUNK_DIR: ${{ runner.temp }}/bootc-chunk
          CHUNK_REFERENCE: sha-${{ steps.image.outputs.short_sha }}
          SOURCE_IMAGE: ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}
        run: |
          set -euo pipefail

          rm -rf "${CHUNK_DIR}"
          mkdir -p "${CHUNK_DIR}"

          rpm-ostree compose build-chunked-oci \
            --bootc \
            --format-version=2 \
            --from="${SOURCE_IMAGE}" \
            --reference="${CHUNK_REFERENCE}" \
            --output="oci:${CHUNK_DIR}/chunked"

      - name: Push chunked image
        if: github.event_name != 'pull_request'
        env:
          CHUNK_DIR: ${{ runner.temp }}/bootc-chunk
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          SHORT_SHA: ${{ steps.image.outputs.short_sha }}
        run: |
          set -euo pipefail

          skopeo copy \
            --all \
            --format=oci \
            --dest-compress \
            --dest-compress-format=zstd:chunked \
            --dest-force-compress-format \
            "oci:${CHUNK_DIR}/chunked:sha-${SHORT_SHA}" \
            "docker://ghcr.io/${IMAGE_NAME}:sha-${SHORT_SHA}"

      - name: Retag pushed manifest
        if: github.event_name != 'pull_request'
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION_TAG: ${{ steps.image.outputs.version_tag }}
          SHORT_SHA: ${{ steps.image.outputs.short_sha }}
        run: |
          set -euo pipefail

          source_tag="sha-${SHORT_SHA}"

          for target_tag in "${VERSION_TAG}" latest; do
            skopeo copy \
              --all \
              --preserve-digests \
              "docker://ghcr.io/${IMAGE_NAME}:${source_tag}" \
              "docker://ghcr.io/${IMAGE_NAME}:${target_tag}"
          done

      - name: Delete older image versions
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          package_name="${PACKAGE_NAME,,}"
          if [[ "${OWNER_TYPE}" == "Organization" ]]; then
            package_path="/orgs/${REPOSITORY_OWNER}/packages/container/${package_name}/versions"
          else
            package_path="/users/${REPOSITORY_OWNER}/packages/container/${package_name}/versions"
          fi

          gh api --paginate --slurp "${package_path}?per_page=100" |
          jq -r 'flatten | sort_by(.created_at) | reverse | .[5:][] | .id' |
          while read -r version_id; do
            [[ -n "${version_id}" ]] || continue
            gh api --method DELETE "${package_path}/${version_id}"
          done
