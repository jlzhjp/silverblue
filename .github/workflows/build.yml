name: Build bootc image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-bootc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and publish
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free runner disk space
        run: sudo rm -rf /opt/hostedtoolcache

      - name: Normalize image name
        id: image
        run: |
          image_name="${IMAGE_NAME,,}"
          base_image="$(sed -n 's|^FROM \(quay\.io/fedora/fedora-silverblue:[0-9][0-9]*@sha256:[a-f0-9]\{64\}\)\( AS .*\)\{0,1\}$|\1|p' Containerfile | head -n 1)"
          version_tag="$(sed -n 's|^FROM quay\.io/fedora/fedora-silverblue:\([0-9][0-9]*\)@sha256:[a-f0-9]\{64\}\( AS .*\)\{0,1\}$|\1|p' Containerfile | head -n 1)"
          if [[ -z "${base_image}" ]]; then
            echo "Unable to determine Fedora Silverblue base image from Containerfile" >&2
            exit 1
          fi
          if [[ -z "${version_tag}" ]]; then
            echo "Unable to determine Fedora Silverblue version from Containerfile" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA::12}"
          {
            echo "name=${image_name}"
            echo "base_image=${base_image}"
            echo "version_tag=${version_tag}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect base image
        id: base-config
        env:
          BASE_IMAGE: ${{ steps.image.outputs.base_image }}
        run: |
          set -euo pipefail

          podman pull "${BASE_IMAGE}"
          base_config="$(podman inspect "${BASE_IMAGE}" | jq -c .)"
          echo "config=${base_config}" >> "${GITHUB_OUTPUT}"

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: ${{ steps.image.outputs.name }}
          tags: |
            sha-${{ steps.image.outputs.short_sha }}
          archs: amd64
          layers: true
          oci: true
          build-args: |
            CHUNKAH_CONFIG_STR=${{ steps.base-config.outputs.config }}
          extra-args: |
            --skip-unused-stages=false
            --volume=${{ github.workspace }}:/run/src
            --security-opt=label=disable
          containerfiles: |
            ./Containerfile

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io
          extra-args: |
            --format=oci
            --compression-format=zstd:chunked

      - name: Retag pushed manifest
        if: github.event_name != 'pull_request'
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION_TAG: ${{ steps.image.outputs.version_tag }}
          SHORT_SHA: ${{ steps.image.outputs.short_sha }}
        run: |
          set -euo pipefail

          source_tag="sha-${SHORT_SHA}"

          for target_tag in "${VERSION_TAG}" latest; do
            skopeo copy \
              --all \
              --preserve-digests \
              "docker://ghcr.io/${IMAGE_NAME}:${source_tag}" \
              "docker://ghcr.io/${IMAGE_NAME}:${target_tag}"
          done

      - name: Delete older image versions
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          package_name="${PACKAGE_NAME,,}"
          if [[ "${OWNER_TYPE}" == "Organization" ]]; then
            package_path="/orgs/${REPOSITORY_OWNER}/packages/container/${package_name}/versions"
          else
            package_path="/users/${REPOSITORY_OWNER}/packages/container/${package_name}/versions"
          fi

          gh api --paginate --slurp "${package_path}?per_page=100" |
          jq -r 'flatten | sort_by(.created_at) | reverse | .[5:][] | .id' |
          while read -r version_id; do
            [[ -n "${version_id}" ]] || continue
            gh api --method DELETE "${package_path}/${version_id}"
          done
